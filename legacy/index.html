<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makler.az - Ən yaxşı əmlaklar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="main-header">
        <div class="container header-content">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9.5L12 3L21 9.5V20C21 20.2652 20.8946 20.5196 20.7071 20.7071C20.5196 20.8946 20.2652 21 20 21H4C3.73478 21 3.48043 20.8946 3.29289 20.7071C3.10536 20.5196 3 20.2652 3 20V9.5Z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 21V12H15V21" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Makler.az</span>
            </div>
            <nav class="nav-links">
                <a href="#">Haqqımızda</a>
                <a href="#">Əlaqə</a>
                <a href="#" class="btn-primary">+ Elan yerləşdir</a>
            </nav>
        </div>
    </header>

    <!-- Hero / Search Section -->
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1 class="hero-title">Xəyallarınızdakı əmlakı tapın</h1>
            <p class="hero-subtitle">Azərbaycanın hər yerində minlərlə etibarlı daşınmaz əmlak elanı</p>

            <div class="search-box">
                <!-- Toggle Alış / Satış -->
                <div class="type-toggles" id="transactionToggles">
                    <label class="toggle-btn active">
                        <input type="radio" name="transactionType" value="satish" checked>
                        <span>Satış</span>
                    </label>
                    <label class="toggle-btn">
                        <input type="radio" name="transactionType" value="alish">
                        <span>Alış</span>
                    </label>
                </div>

                <div class="filter-row main-filters">
                    
                    <!-- Category Dropdown -->
                    <div class="filter-group dropdown-group" id="categoryDropdownContainer">
                        <label>Elan Kateqoriyası</label>
                        <div class="custom-select" id="categorySelectBox">
                            <span class="selected-text" id="selectedCategoryText">Mənzil</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                        <ul class="dropdown-list" id="categoryList">
                            <li data-value="menzil" class="active">Mənzil</li>
                            <li data-value="heyet_evi">Həyət evi</li>
                            <li data-value="qaraj">Qaraj</li>
                            <li data-value="obyekt">Obyekt</li>
                            <li data-value="torpaq">Torpaq</li>
                            <li data-value="ofis">Ofis</li>
                        </ul>
                    </div>

                    <!-- Location Dropdown -->
                    <div class="filter-group dropdown-group">
                        <label>Yerləşdiyi ərazi</label>
                        <select class="native-select" id="locationSelect">
                            <option value="">Bütün Azərbaycan</option>
                            <option value="baku">Bakı</option>
                            <option value="absheron">Abşeron</option>
                            <option value="sumqayit">Sumqayıt</option>
                            <option value="ganja">Gəncə</option>
                            <!-- Others generated by JS -->
                        </select>
                    </div>

                    <!-- Dynamic Field Container (Rooms or Area) -->
                    <div class="filter-group" id="dynamicFieldContainer">
                        <label id="dynamicFieldLabel">Otaq sayı</label>
                        <select class="native-select" id="dynamicSelect">
                            <option value="">İstənilən</option>
                            <option value="1">1 otaqlı</option>
                            <option value="2">2 otaqlı</option>
                            <option value="3">3 otaqlı</option>
                            <option value="4">4 otaqlı</option>
                            <option value="5+">5 və daha çox</option>
                        </select>
                    </div>

                    <!-- Price Filter -->
                    <div class="filter-group price-group">
                        <label>Qiymət (AZN)</label>
                        <div class="price-inputs">
                            <input type="number" placeholder="Min" id="priceMin">
                            <span>-</span>
                            <input type="number" placeholder="Max" id="priceMax">
                        </div>
                    </div>

                    <!-- Search Button -->
                    <div class="filter-group action-group">
                        <button class="search-btn" id="searchButton">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            Axtar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
